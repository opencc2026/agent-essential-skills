name: Publish to ClawHub

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. 安装clawhub
    - name: Install clawhub
      run: npm install -g clawhub
    
    # 3. 使用Token登录并发布
    - name: Publish to ClawHub
      env:
        CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      run: |
        # 检查Token是否设置
        if [ -z "$CLAWHUB_TOKEN" ]; then
          echo "❌ 错误: CLAWHUB_TOKEN未设置"
          echo "请在仓库Settings → Secrets → Actions中添加CLAWHUB_TOKEN"
          exit 1
        fi
        
        # 登录ClawHub
        echo "🔐 登录ClawHub..."
        echo "$CLAWHUB_TOKEN" | clawhub login --token
        
        # 发布到ClawHub
        echo "📦 发布到ClawHub..."
        clawhub publish .