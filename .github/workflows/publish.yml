name: Publish to ClawHub

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install clawhub
      run: npm install -g clawhub
    
    - name: Login to ClawHub
      env:
        CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      run: |
        if [ -z "$CLAWHUB_TOKEN" ]; then
          echo "ERROR: CLAWHUB_TOKEN is not set"
          echo "Please add CLAWHUB_TOKEN to repository secrets"
          exit 1
        fi
        echo "$CLAWHUB_TOKEN" | clawhub login --token
        echo "✅ Logged in to ClawHub"
    
    - name: Publish to ClawHub
      run: |
        echo "📦 Publishing to ClawHub..."
        if clawhub publish .; then
          echo "✅ Successfully published!"
        else
          echo "❌ Failed to publish"
          exit 1
        fi